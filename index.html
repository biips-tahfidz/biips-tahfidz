<div id="loginSection" style="max-width: 400px; margin: 50px auto; padding: 20px; border: 1px solid #ccc; border-radius: 8px;">
  <h2>Login BIIPS Tahfidz</h2>
  <label>Username:</label>
  <input type="text" id="username" style="width:100%; margin-bottom:10px; padding:8px;"><br>
  
  <label>Password:</label>
  <input type="password" id="password" style="width:100%; margin-bottom:15px; padding:8px;"><br>
  
  <button onclick="handleLogin()" style="width:100%; padding:10px; background:#16a085; color:white; border:none; border-radius:4px; cursor:pointer;">Masuk</button>
  <p id="loginMessage" style="color:red; text-align:center; margin-top:10px;"></p>
</div>

<div id="santriPage" style="display:none; padding: 20px;">
  <h3>Selamat Datang Santri, Silakan Lakukan Setoran Rekaman</h3>
  </div>

<div id="guruPage" style="display:none; padding: 20px;">
  <h3>Selamat Datang Ustadz / Ustadzah</h3>
  <p>Anda dapat mengecek setoran audio santri langsung di dokumen Google Sheets Data Setoran Santri melalui menu "Pemutar Audio BIIPS".</p>
</div>

<script>
// Ganti dengan URL Web App Apps Script Anda hasil deploy terbaru
const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzllDaUr-pE6wkGtTYoCqSH84RfeoNGY4VH-w9RPE-qivSraki1MCdCRl2KdzhMMYfMTA/exec";

function handleLogin() {
  const user = document.getElementById("username").value;
  const pass = document.getElementById("password").value;
  const msg = document.getElementById("loginMessage");
  
  if(!user || !pass) {
    msg.innerText = "Semua kolom wajib diisi!";
    return;
  }
  
  msg.style.color = "blue";
  msg.innerText = "Mengecek akun...";
  
  // Memanggil fungsi doGet di Apps Script dengan parameter login
  fetch(`${WEB_APP_URL}?action=login&username=${encodeURIComponent(user)}&password=${encodeURIComponent(pass)}`)
    .then(response => response.json())
    .then(data => {
      if (data.status === "success") {
        // Sembunyikan form login
        document.getElementById("loginSection").style.display = "none";
        
        // Cek Role hasil balasan dari Google Sheet
        if (data.role === "santri") {
          document.getElementById("santriPage").style.display = "block";
        } else if (data.role === "guru") {
          document.getElementById("guruPage").style.display = "block";
        }
      } else {
        msg.style.color = "red";
        msg.innerText = data.message;
      }
    })
    .catch(err => {
      msg.style.color = "red";
      msg.innerText = "Terjadi gangguan koneksi sistem.";
      console.error(err);
    });
}
</script>
